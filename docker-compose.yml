services:
  nexdown:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FLASK_DEBUG=0
      - MAX_CONCURRENT_DOWNLOADS=5
      - MAX_FILE_AGE_HOURS=2
      - MIN_DISK_FREE_MB=500
    volumes:
      - downloads:/app/downloads
    restart: unless-stopped

volumes:
  downloads:
