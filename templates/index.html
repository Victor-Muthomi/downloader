<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexDown — Multi Video Downloader</title>
    <meta name="description"
        content="Download videos from YouTube, TikTok, Vimeo, and hundreds of other sites. Free, fast, and private.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>

    <div class="top-nav container">
        <button id="historyModalBtn" class="history-toggle-btn glass-btn" aria-label="Open History">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            History
        </button>
    </div>

    <main class="container layout-grid">
        <div class="main-column">
            <div class="card glass">
                <header>
                    <div class="logo" aria-label="NexDown logo">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M21.5 7.5C21.5 5.5 20.5 4.5 18.5 4.5H5.5C3.5 4.5 2.5 5.5 2.5 7.5V16.5C2.5 18.5 3.5 19.5 5.5 19.5H18.5C20.5 19.5 21.5 18.5 21.5 16.5V7.5Z"
                                stroke="url(#logo-grad)" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M10 9.5L15 12L10 14.5V9.5Z" fill="url(#logo-grad)" />
                            <defs>
                                <linearGradient id="logo-grad" x1="2.5" y1="4.5" x2="21.5" y2="19.5"
                                    gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#38bdf8" />
                                    <stop offset="1" stop-color="#8b5cf6" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <h1>NexDown</h1>
                    </div>
                    <p class="subtitle">Download from YouTube, TikTok, Vimeo, and 1,000+ sites.</p>
                </header>

                <form id="downloadForm" novalidate>
                    <div class="input-group">
                        <textarea id="urlInput"
                            placeholder="Paste video URL here…&#10;(one per line for multiple downloads)" required
                            autocomplete="off" aria-label="Video URL" rows="2"></textarea>
                        <button type="button" class="icon-btn" id="pasteBtn" title="Paste from clipboard"
                            aria-label="Paste URL">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                            </svg>
                        </button>
                    </div>

                    <div class="settings-row">
                        <div class="setting-item">
                            <label for="formatSelect" class="format-label">Quality</label>
                            <div class="select-wrapper">
                                <select id="formatSelect" aria-label="Download format">
                                    <option value="best">Best Quality (MP4)</option>
                                    <option value="720p">720p (MP4)</option>
                                    <option value="480p">480p (MP4)</option>
                                    <option value="audio">Audio Only (M4A)</option>
                                </select>
                                <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9" />
                                </svg>
                            </div>
                        </div>
                        <div class="setting-item setting-item--small">
                            <label for="threadInput" class="format-label">Threads</label>
                            <input type="number" id="threadInput" min="1" max="16" value="4"
                                aria-label="Number of download threads">
                        </div>
                    </div>

                    <button type="submit" class="primary-btn" id="downloadBtn">
                        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        <span>Download</span>
                        <svg class="spinner" viewBox="0 0 50 50" style="display:none;">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5" />
                        </svg>
                    </button>
                </form>

            </div>

            <footer class="footer">
                <p>Up to 5 concurrent downloads&ensp;·&ensp;Files auto-deleted after 2 hours</p>
            </footer>
        </div>

        <aside class="sidebar-column" id="sidebarColumn" style="display:none;">
            <div class="card glass sidebar-card h-full flex flex-col">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <span class="panel-dot panel-dot--active"></span>
                        Active Downloads
                        <span class="panel-count" id="activeCount">0</span>
                    </h2>
                </div>
                <div class="download-list flex-1 overflow-y-auto" id="activeDownloads" aria-live="polite"></div>
            </div>
        </aside>

    </main>

    <!-- History Modal -->
    <div class="modal-overlay" id="historyModal" aria-hidden="true">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 class="panel-title">
                    <span class="panel-dot panel-dot--history"></span>
                    History
                    <span class="panel-count" id="historyCount">0</span>
                </h2>
                <button type="button" class="icon-btn" id="closeHistoryBtn" aria-label="Close History">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="download-list" id="downloadHistory"></div>
                <p class="panel-empty" id="historyEmpty">No downloads yet. Completed videos will appear here.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="text-btn danger-btn" id="clearHistoryBtn" title="Clear all history">Delete
                    All</button>
            </div>
        </div>
    </div>


    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
